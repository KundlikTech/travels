<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🌐 Basic Info -->
    <title>JK Travels | Your Next Adventure Starts Here</title>
    <meta
      name="description"
      content="JK Travels - Discover incredible destinations with luxurious rides and curated tour experiences across India."
    />
    <meta
      name="keywords"
      content="JK Travels, Travel Agency, Tours, Cab Booking, Fleet, Holidays, Maharashtra, Tourism, JK Travels Pune"
    />

    <!-- 🧭 Open Graph Meta (for social media sharing) -->
    <meta property="og:title" content="JK Travels" />
    <meta
      property="og:description"
      content="Your next adventure starts here with JK Travels. Discover beautiful destinations with comfort and luxury."
    />
    <meta property="og:image" content="/images/homepage.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />

    <!-- 🐦 Twitter Card (for Twitter/X link previews) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="JK Travels" />
    <meta
      name="twitter:description"
      content="Your next adventure starts here with JK Travels. Explore with comfort and style."
    />
    <meta name="twitter:image" content="/images/homepage.png" />

    <!-- 🖼️ Favicon -->
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <!-- 🖼️ Preload critical images for instant first paint -->
<link rel="preload" as="image" href="/images/homepage.png" fetchpriority="high" />
<link rel="preload" as="image" href="/images/toyota-innova.png" />
<link rel="preload" as="image" href="/images/stats-background.jpg" />


    <!-- 💛 Theme Color -->
    <meta name="theme-color" content="#fb8500" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
